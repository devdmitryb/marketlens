<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📡</text></svg>" />
  <title>MarketLens — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0a0a0f;
      --surface: #13131a;
      --border:  #1f1f2e;
      --accent:  #c8f135;
      --text:    #e8e8f0;
      --muted:   #4a4a6a;
      --danger:  #ff4d6d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 48px;
      width: 400px;
      max-width: 95vw;
      position: relative;
      z-index: 1;
    }
    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      padding: 12px 16px;
      border-radius: 8px;
      outline: none;
      margin-bottom: 20px;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--accent); }
    button {
      width: 100%;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: #d9ff3f; transform: translateY(-1px); }
    .error {
      color: var(--danger);
      font-size: 0.8rem;
      text-align: center;
      margin-top: 12px;
      display: none;
    }
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Market<span>Lens</span></div>
    <div class="subtitle">Stock Analyst Dashboard</div>

    <label>Password</label>
    <input type="password" id="password" placeholder="Enter password"
      onkeydown="if(event.key==='Enter') login()" autofocus />

    <button onclick="login()" id="loginBtn">Sign In</button>
    <div class="spinner" id="spinner"></div>
    <div class="error" id="error">Incorrect password. Try again.</div>
  </div>

  <script>
    const SERVER = 'https://marketlens-bt5u.onrender.com';

    // Already logged in?
    const token = sessionStorage.getItem('ml_token') || localStorage.getItem('ml_token');
    if (token) window.location.href = '/dashboard.html';

    async function login() {
      const pwd = document.getElementById('password').value.trim();
      if (!pwd) return;

      const btn     = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      const error   = document.getElementById('error');

      btn.style.display     = 'none';
      spinner.style.display = 'block';
      error.style.display   = 'none';

      try {
        const res = await fetch(`${SERVER}/api/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ password: pwd }),
        });

        if (res.ok) {
          const { token } = await res.json();
          sessionStorage.setItem('ml_token', token);
          localStorage.setItem('ml_token', token); // remember across sessions
          window.location.href = '/dashboard.html';
        } else {
          throw new Error('Invalid');
        }
      } catch {
        btn.style.display     = 'block';
        spinner.style.display = 'none';
        error.style.display   = 'block';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    }
  </script>
</body>
</html>
